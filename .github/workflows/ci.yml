name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - feature/model-training

  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:

  test-and-quality:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          PYTHONPATH=. pytest

      - name: Run Ruff linting
        run: |
          ruff check src tests

      - name: Run Black formatting check
        run: |
          black --check src tests

  docker-validation:
    runs-on: ubuntu-latest
    needs: test-and-quality

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t intelligent-demand-api .

  pipeline-validation:
    runs-on: ubuntu-latest
    needs: test-and-quality

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify important project files
        run: |
          test -f Dockerfile
          test -f requirements.txt
          test -f README.md
          test -f config/config.yaml

      - name: Verify model artifacts exist
        run: |
          ls models/

      - name: Verify API imports
        run: |
          python -c "from src.api.main import app"

      - name: Verify prediction module
        run: |
          python -c "from src.api.predict import predict_demand"
